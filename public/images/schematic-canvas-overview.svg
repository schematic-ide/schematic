<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Schematic canvas overview</title>
  <desc id="desc">A Schematic canvas showing ROS nodes connected by cyan topic lines.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111b2a"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0" stop-color="#4bddd4" stop-opacity=".3"/>
      <stop offset=".5" stop-color="#35d9f2"/>
      <stop offset="1" stop-color="#4bddd4" stop-opacity=".4"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#16202f" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="#0b1220"/>
  <rect width="1200" height="675" fill="url(#grid)" opacity=".8"/>
  <rect x="42" y="42" width="250" height="591" rx="14" fill="#0b1421" stroke="#243244"/>
  <text x="72" y="82" fill="#4bddd4" font-family="JetBrains Mono, monospace" font-size="13">NODE PALETTE</text>
  <g fill="#111b2a" stroke="#243244">
    <rect x="70" y="108" width="192" height="48" rx="8"/>
    <rect x="70" y="178" width="192" height="48" rx="8"/>
    <rect x="70" y="248" width="192" height="48" rx="8"/>
    <rect x="70" y="318" width="192" height="48" rx="8"/>
    <rect x="70" y="388" width="192" height="48" rx="8"/>
  </g>
  <g fill="#cbd5e1" font-family="Inter, sans-serif" font-size="15">
    <text x="94" y="138">Camera driver</text>
    <text x="94" y="208">TF broadcaster</text>
    <text x="94" y="278">Path planner</text>
    <text x="94" y="348">Controller</text>
    <text x="94" y="418">Diagnostics</text>
  </g>
  <path d="M458 232 C556 232 562 326 662 326" fill="none" stroke="url(#line)" stroke-width="4" filter="url(#glow)"/>
  <path d="M458 454 C568 454 574 358 662 358" fill="none" stroke="url(#line)" stroke-width="4" filter="url(#glow)"/>
  <path d="M842 342 C920 342 938 266 1002 266" fill="none" stroke="url(#line)" stroke-width="4" filter="url(#glow)"/>
  <path d="M842 366 C920 366 938 454 1002 454" fill="none" stroke="url(#line)" stroke-width="4" filter="url(#glow)"/>
  <g font-family="Inter, sans-serif">
    <g transform="translate(330 174)">
      <rect width="168" height="112" rx="13" fill="url(#panel)" stroke="#4bddd4" stroke-opacity=".5"/>
      <text x="22" y="39" fill="#f8fafc" font-size="19" font-weight="700">camera</text>
      <text x="22" y="68" fill="#94a3b8" font-size="13">sensor_msgs/Image</text>
      <text x="22" y="91" fill="#67e8f9" font-family="JetBrains Mono, monospace" font-size="12">30hz</text>
      <circle cx="168" cy="58" r="7" fill="#4bddd4"/>
    </g>
    <g transform="translate(330 398)">
      <rect width="168" height="112" rx="13" fill="url(#panel)" stroke="#4bddd4" stroke-opacity=".5"/>
      <text x="22" y="39" fill="#f8fafc" font-size="19" font-weight="700">tf_static</text>
      <text x="22" y="68" fill="#94a3b8" font-size="13">base_link</text>
      <text x="22" y="91" fill="#67e8f9" font-family="JetBrains Mono, monospace" font-size="12">frame map</text>
      <circle cx="168" cy="58" r="7" fill="#4bddd4"/>
    </g>
    <g transform="translate(662 282)">
      <rect width="180" height="122" rx="13" fill="url(#panel)" stroke="#4bddd4" stroke-opacity=".75"/>
      <circle cx="0" cy="46" r="7" fill="#4bddd4"/>
      <circle cx="180" cy="60" r="7" fill="#4bddd4"/>
      <text x="24" y="42" fill="#f8fafc" font-size="20" font-weight="700">planner</text>
      <text x="24" y="72" fill="#94a3b8" font-size="13">nav2 planner</text>
      <text x="24" y="96" fill="#67e8f9" font-family="JetBrains Mono, monospace" font-size="12">rate: 20hz</text>
    </g>
    <g transform="translate(1002 210)">
      <rect width="156" height="112" rx="13" fill="url(#panel)" stroke="#4bddd4" stroke-opacity=".5"/>
      <circle cx="0" cy="56" r="7" fill="#4bddd4"/>
      <text x="22" y="39" fill="#f8fafc" font-size="19" font-weight="700">map</text>
      <text x="22" y="68" fill="#94a3b8" font-size="13">occupancy grid</text>
    </g>
    <g transform="translate(1002 398)">
      <rect width="156" height="112" rx="13" fill="url(#panel)" stroke="#4bddd4" stroke-opacity=".5"/>
      <circle cx="0" cy="56" r="7" fill="#4bddd4"/>
      <text x="22" y="39" fill="#f8fafc" font-size="19" font-weight="700">cmd_vel</text>
      <text x="22" y="68" fill="#94a3b8" font-size="13">geometry/Twist</text>
    </g>
  </g>
</svg>
